name: the_good_alarm
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  firebase_core: ^3.14.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter:
    sdk: flutter
  intl: ^0.20.2
  google_sign_in: ^6.3.0
  googleapis: ^13.2.0
  http: ^1.2.2
  shared_preferences: ^2.5.3
  flutter_tts: ^4.2.0
  sherpa_onnx: ^1.13.2
  path_provider: ^2.1.5
  audioplayers: ^6.0.0
  archive: ^4.0.7
  flutter_gemma: ^0.16.1
  flutter_secure_storage: ^9.2.2
  crypto: ^3.0.6
  file_picker: ^8.3.7
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1 

flutter_launcher_icons: 
  android: true 
  ios: true 
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png" 
  min_sdk_android: 21 # android min sdk min:16, default 21 
  web: 
    generate: true 
    image_path: "assets/icon/app_icon.png" 
    background_color: "##FFFFFF" 
    theme_color: "#FFFFFF" 
    favicon: true  # Esto genera el favicon automáticamente 


flutter:
  uses-material-design: true
